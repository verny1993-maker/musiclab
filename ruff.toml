# ruff configuration for MusicLab
# Permissive defaults — project code preceded the linter.

target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import ordering)
]
ignore = [
    "E501",  # line too long (project has long lines)
    "E402",  # module level import not at top (sys.path.insert pattern)
    "E701",  # multiple statements on one line (colon) — author style
    "E702",  # multiple statements on one line (semicolon)
    "E741",  # ambiguous variable name (l)
]

[lint.per-file-ignores]
"tests/*" = ["F811"]  # allow redefinition in tests

[format]
quote-style = "double"
indent-style = "space"
